<!DOCTYPE html>
<html>
<head>
    <title>Library Book Service</title>
</head>
<body>

<h2>📚 Library Book Service</h2>

<h3>Add Book</h3>
<form method="POST" action="library.php">
    <input type="hidden" name="action" value="add">
    Title: <input type="text" name="title" required><br><br>
    Author: <input type="text" name="author" required><br><br>
    Genre: <input type="text" name="genre" required><br><br>
    Price: <input type="number" step="0.01" name="price" required><br><br>
    <button type="submit">Add Book</button>
</form>
<hr>

<h3>Update Book</h3>
<form method="POST" action="library.php">
    <input type="hidden" name="action" value="update">
    ID: <input type="number" name="id" required><br><br>
    Title: <input type="text" name="title" required><br><br>
    Author: <input type="text" name="author" required><br><br>
    Genre: <input type="text" name="genre" required><br><br>
    Price: <input type="number" step="0.01" name="price" required><br><br>
    <button type="submit">Update Book</button>
</form>
<hr>


<h3>Delete Book</h3>
<form method="POST" action="library.php">
    <input type="hidden" name="action" value="delete">
    ID: <input type="number" name="id" required><br><br>
    <button type="submit">Delete Book</button>
</form>

<hr>

<h3>View Books</h3>
<form method="GET" action="library.php">
    <input type="hidden" name="action" value="view">
    Book ID (optional): <input type="number" name="id"><br><br>
    <button type="submit">View Book(s)</button>
</form>

</body>
</html>
