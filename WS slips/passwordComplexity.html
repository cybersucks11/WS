<!DOCTYPE html>
<html>
<head>
    <title>Password Validation</title>
</head>
<body>

<h3>Login Form</h3>

Username: <input type="text" id="user"><br><br>
Password: <input type="password" id="pass"><br><br>

<button onclick="check()">Submit</button>

<p id="msg"></p>

<script>
function check(){
    let p = document.getElementById("pass").value;

    // conditions
    let hasNum = /[0-9]/.test(p);
    let hasAlpha = /[a-zA-Z]/.test(p);
    let hasSpecial = /[!@#$%^&*]/.test(p);

    if(p.length > 8 && hasNum && hasAlpha && hasSpecial){
        document.getElementById("msg").innerHTML = "You entered strong password";
    } else {
        document.getElementById("msg").innerHTML = "Enter complex password";
    }
}
</script>

</body>
</html>
