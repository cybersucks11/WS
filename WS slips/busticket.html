<!DOCTYPE html>
<html>
<head>
    <title>Bus Reservation</title>
    <style>
        body { font-family: Arial; }
        .form-group {
            display: flex;
            margin: 8px;
        }
        label {
            width: 150px;
        }
    </style>
</head>
<body>

<h2>Bus Ticket Reservation</h2>

<form>

<div class="form-group">
<label>Name:</label>
<input type="text">
</div>

<div class="form-group">
<label>Address:</label>
<textarea></textarea>
</div>

<div class="form-group">
<label>Contact No:</label>
<input type="text">
</div>

<div class="form-group">
<label>Source:</label>
<select>
<option>Pune</option>
<option>Mumbai</option>
<option>Nashik</option>
</select>
</div>

<div class="form-group">
<label>Destination:</label>
<select>
<option>Pune</option>
<option>Mumbai</option>
<option>Nashik</option>
</select>
</div>

<div class="form-group">
<label>Booking Date:</label>
<input type="date">
</div>

<div class="form-group">
<label>Journey Date:</label>
<input type="date">
</div>

<div class="form-group">
<label>No. of Passengers:</label>
<input type="number">
</div>

<div class="form-group">
<label>Passenger Name:</label>
<input type="text">
</div>

<div class="form-group">
<label>Gender:</label>
<input type="radio" name="g">Male
<input type="radio" name="g">Female
</div>

<div class="form-group">
<button type="submit">Submit</button>
</div>

</form>

</body>
</html>
